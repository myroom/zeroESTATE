services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: estate
      POSTGRES_PASSWORD: estate
      POSTGRES_DB: estate
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U estate"]
      interval: 5s
      timeout: 3s
      retries: 10

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql+asyncpg://estate:estate@db:5432/estate
      DATABASE_URL_SYNC: postgresql://estate:estate@db:5432/estate
    depends_on:
      db:
        condition: service_healthy

  scraper-pik:
    build:
      context: .
      dockerfile: scrapers/pik/Dockerfile
    environment:
      DATABASE_URL_SYNC: postgresql://estate:estate@db:5432/estate
    depends_on:
      db:
        condition: service_healthy

  scraper-samolet:
