{% extends "base.html" %}
{% block title %}Объекты - zeroESTATE{% endblock %}

{% block content %}
<h2 class="text-2xl font-bold mb-6">Объекты</h2>

<!-- Filters -->
<div class="bg-white dark:bg-gray-800 rounded-lg shadow p-5 mb-6">
    <form hx-get="/properties" hx-target="#properties-table" hx-swap="outerHTML" hx-push-url="true"
          class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-8 gap-3">

        <div>
            <label class="block text-xs text-slate-500 dark:text-gray-400 mb-1">Источник</label>
            <select name="source" class="w-full bg-slate-100 dark:bg-gray-700 border border-slate-300 dark:border-gray-600 rounded px-2 py-1.5 text-sm text-slate-800 dark:text-white">
                <option value="">Все</option>
                {% for src in all_sources %}
                <option value="{{ src.slug }}" {% if filters.source == src.slug %}selected{% endif %}>{{ src.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div>
            <label class="block text-xs text-slate-500 dark:text-gray-400 mb-1">Тип</label>
            <select name="property_type" class="w-full bg-slate-100 dark:bg-gray-700 border border-slate-300 dark:border-gray-600 rounded px-2 py-1.5 text-sm text-slate-800 dark:text-white">
                <option value="">Все</option>
                {% for t in property_types %}
                <option value="{{ t }}" {% if filters.property_type == t %}selected{% endif %}>{{ t }}</option>
                {% endfor %}
            </select>
        </div>

        <div>
            <label class="block text-xs text-slate-500 dark:text-gray-400 mb-1">Площадь от</label>
            <input type="number" name="min_area" value="{{ filters.min_area }}" placeholder="м&sup2;"
                   class="w-full bg-slate-100 dark:bg-gray-700 border border-slate-300 dark:border-gray-600 rounded px-2 py-1.5 text-sm text-slate-800 dark:text-white">
        </div>
        <div>
            <label class="block text-xs text-slate-500 dark:text-gray-400 mb-1">Площадь до</label>
            <input type="number" name="max_area" value="{{ filters.max_area }}" placeholder="м&sup2;"
                   class="w-full bg-slate-100 dark:bg-gray-700 border border-slate-300 dark:border-gray-600 rounded px-2 py-1.5 text-sm text-slate-800 dark:text-white">
        </div>

        <div>
            <label class="block text-xs text-slate-500 dark:text-gray-400 mb-1">Цена от</label>
            <input type="number" name="min_price" value="{{ filters.min_price }}" placeholder="&#8381;"
                   class="w-full bg-slate-100 dark:bg-gray-700 border border-slate-300 dark:border-gray-600 rounded px-2 py-1.5 text-sm text-slate-800 dark:text-white">
        </div>
        <div>
            <label class="block text-xs text-slate-500 dark:text-gray-400 mb-1">Цена до</label>
            <input type="number" name="max_price" value="{{ filters.max_price }}" placeholder="&#8381;"
                   class="w-full bg-slate-100 dark:bg-gray-700 border border-slate-300 dark:border-gray-600 rounded px-2 py-1.5 text-sm text-slate-800 dark:text-white">
        </div>

        <div>
            <label class="block text-xs text-slate-500 dark:text-gray-400 mb-1">Район</label>
            <input type="text" name="district" value="{{ filters.district }}" placeholder="Район"
                   class="w-full bg-slate-100 dark:bg-gray-700 border border-slate-300 dark:border-gray-600 rounded px-2 py-1.5 text-sm text-slate-800 dark:text-white">
        </div>
        <div>
            <label class="block text-xs text-slate-500 dark:text-gray-400 mb-1">Метро</label>
            <input type="text" name="metro" value="{{ filters.metro }}" placeholder="Станция"
                   class="w-full bg-slate-100 dark:bg-gray-700 border border-slate-300 dark:border-gray-600 rounded px-2 py-1.5 text-sm text-slate-800 dark:text-white">
        </div>

        <input type="hidden" name="sort" value="{{ sort }}">
        <input type="hidden" name="order" value="{{ order }}">

        <div class="col-span-2 md:col-span-4 lg:col-span-8 flex justify-end">
            <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm px-4 py-1.5 rounded transition-colors">
                Применить
            </button>
        </div>
    </form>
</div>

<!-- Table -->
{% include "partials/properties_table.html" %}
{% endblock %}
